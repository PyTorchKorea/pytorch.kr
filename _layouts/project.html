---
layout: default
---
<div class="jumbotron jumbotron-fluid on-dark-background">
  <div class="container">
    <h1>{{ page.project_name }}</h1>
    {% if page.project_description %}
    <p class="lead">{{ page.project_description }}</p>
    {% endif %}
  </div>
</div>

<div class="main-content-wrapper">
  <div class="main-content">
    <div class="container">
      <article class="pytorch-article">
        {{ content }}
      </article>
    </div>
  </div>
</div>
