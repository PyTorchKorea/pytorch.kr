name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22.17.1
    - name: Install node dependencies
      run: |
        npm install -g yarn
        yarn install
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev build-essential
    - name: Set up Ruby 3.4
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.4.5
        bundler-cache: true
    - name: Verify bundler and install dependencies
      run: |
        bundler --version
        gem install rake
        bundle check || bundle install --jobs 4 --retry 3
    - name: Initialize & update hub submodule
      run: |
        git submodule deinit -f . && git submodule update --init --recursive
        git submodule update --remote
        ./_devel/update_hub_submodule.sh
    - name: Copy vendor assets
      run: make include-yarn-deps
    - name: Build Jekyll site
      env:
        JEKYLL_GITHUB_TOKEN: ${{ secrets.JEKYLL_GITHUB_TOKEN }}
      run: |
        JEKYLL_ENV=preview bundle exec jekyll build
    - name: Deploy to surge.sh
      if: github.event.pull_request.head.repo.full_name == github.repository
      env:
        SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      run: |
        npm install -g surge
        surge ./_site pr-${{ github.event.pull_request.number }}-pytorch-kr.surge.sh
    - name: Comment preview URL on PR
      if: success() && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const previewUrl = `https://pr-${prNumber}-pytorch-kr.surge.sh`;
          const body = [
            '## PR Preview',
            '',
            '빌드가 완료되었습니다! 아래 링크에서 변경사항을 확인할 수 있습니다.',
            '',
            `**미리보기**: ${previewUrl}`,
            '',
            '> 이 미리보기는 PR이 업데이트될 때마다 자동으로 갱신됩니다.',
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });
          const botComment = comments.find(c => c.body.includes('PR Preview'));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
          }
    - name: Comment build failure on PR
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            '## PR Preview - Build Failed',
            '',
            `빌드 중 오류가 발생했습니다. [워크플로우 로그](${runUrl})를 확인해주세요.`,
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });
          const botComment = comments.find(c => c.body.includes('PR Preview'));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
          }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
    - name: Teardown surge.sh preview
      env:
        SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      run: |
        npm install -g surge
        surge teardown pr-${{ github.event.pull_request.number }}-pytorch-kr.surge.sh
    - name: Comment cleanup on PR
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.payload.pull_request.number;
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });
          const botComment = comments.find(c => c.body.includes('PR Preview'));

          if (botComment) {
            const body = [
              '## PR Preview',
              '',
              '~~미리보기가 삭제되었습니다.~~',
              '',
              '> PR이 닫혀 미리보기가 자동으로 정리되었습니다.',
            ].join('\n');
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body,
            });
          }
